<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Personal Finance Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container">
        <a class="navbar-brand" href="#"><i class="bi bi-wallet2"></i> Finance Tracker</a>
      </div>
    </nav>

    <main class="container">
      <header class="mb-3">
        <h1 class="h3">Personal Finance Tracker</h1>
      </header>

      <div class="row">
        <div class="col-md-4">
          <div class="card mb-3">
            <div class="card-body">
              <h5 class="card-title">Add Expense</h5>
              <form id="expenseForm">
                <div class="mb-2"><label class="form-label">Date</label><input name="date" type="date" class="form-control" required></div>
                <div class="mb-2"><label class="form-label">Category</label><input name="category" class="form-control" placeholder="groceries" required></div>
                <div class="mb-2"><label class="form-label">Amount</label><input name="amount" type="number" step="0.01" class="form-control" placeholder="0.00" required></div>
                <div class="mb-2"><label class="form-label">Note</label><input name="note" class="form-control" placeholder="optional"></div>
                <button class="btn btn-primary mt-2" type="submit">Add</button>
              </form>
            </div>
          </div>
          <div class="card shadow-sm">
            <div class="card-body">
              <h6 class="mb-2">Summary</h6>
              <p class="mb-0"><strong>Total:</strong> <span class="h5 text-success" id="total">${{ '%.2f' % (total or 0) }}</span></p>
            </div>
          </div>
        </div>

        <div class="col-md-8">
          <div class="card shadow-sm">
            <div class="card-body">
              <h5 class="card-title mb-3">Expenses</h5>
              <div class="table-responsive">
                <table class="table table-striped table-hover" id="expensesTable">
                  <thead class="table-light">
                    <tr><th>Date</th><th>Category</th><th class="text-end">Amount</th><th>Note</th></tr>
                  </thead>
                  <tbody id="expensesBody">
                    {% for e in expenses %}
                    <tr>
                      <td>{{ e.date }}</td>
                      <td>{{ e.category }}</td>
                      <td class="text-end">{{ '%.2f' % e.amount }}</td>
                      <td>{{ e.note }}</td>
                    </tr>
                    {% endfor %}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1080">
      <div id="toastContainer"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="" crossorigin="anonymous"></script>
    <script src="/static/script.js"></script>
  </body>
</html>
